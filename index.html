<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPDB PKBM Celah Cahaya 2026</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header-section">
        <!-- Logo Sekolah -->
        <img src="logo.png" alt="Logo PKBM Celah Cahaya" class="logo">
        
        <h1>PPDB PKBM CELAH CAHAYA</h1>
        <h2>Penerimaan Peserta Didik Baru 2026</h2>
        
        <div class="school-info">
            <span>NPSN: P9984574</span>
            <span>Akreditasi: B</span>
            <span>Kurikulum Merdeka</span>
            <span>Kec. Singajaya - Garut</span>
        </div>
    </div>

    <form id="ppdbForm">
        <div class="form-grid">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="nama" placeholder="Masukkan nama sesuai ijazah" required>
            </div>

            <div class="form-group">
                <label>Jenis Kelamin</label>
                <select id="jk" required>
                    <option value="" disabled selected>Pilih Jenis Kelamin</option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>

            <div class="form-group">
                <label>NIK</label>
                <input type="number" id="nik" placeholder="Masukkan 16 digit NIK" required>
            </div>

            <div class="form-group">
                <label>Agama</label>
                <select id="agama" required>
                    <option value="Islam">Islam</option>
                    <option value="Kristen">Kristen</option>
                    <option value="Katholik">Katholik</option>
                    <option value="Hindu">Hindu</option>
                    <option value="Budha">Budha</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tempat Lahir</label>
                <input type="text" id="tempatLahir" placeholder="Kota/Kabupaten kelahiran" required>
            </div>

            <div class="form-group">
                <label>Tanggal Lahir</label>
                <input type="date" id="tanggalLahir" required>
            </div>

            <div class="form-group full-width">
                <label>Alamat Lengkap</label>
                <textarea id="alamat" placeholder="Jalan, RT/RW, Desa/Kelurahan..." required></textarea>
            </div>

            <div class="form-group">
                <label>Asal Sekolah</label>
                <input type="text" id="asalSekolah" placeholder="Nama sekolah sebelumnya" required>
            </div>

            <div class="form-group">
                <label>Email Aktif</label>
                <input type="email" id="email" placeholder="contoh@email.com">
            </div>

            <div class="form-group">
                <label>Pilihan Program I</label>
                <input type="text" id="pilihan1" placeholder="Paket A / B / C" required>
            </div>

            <div class="form-group">
                <label>Pilihan Program II</label>
                <input type="text" id="pilihan2" placeholder="Alternatif program">
            </div>

            <div class="form-group full-width">
                <label>Upload Berkas (Ijazah/KK)</label>
                <input type="file" id="file" required>
                <small class="file-note">*Maksimal ukuran file menyesuaikan limit Google Drive</small>
            </div>
        </div>

        <button type="submit" id="btnSubmit">DAFTAR SEKARANG</button>
    </form>

    <div id="status"></div>
</div>

<script src="script.js"></script>
</body>
</html>
